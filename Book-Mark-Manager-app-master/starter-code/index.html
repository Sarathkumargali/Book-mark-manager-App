<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Bookmark manager app</title>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="logo-section">
          <img src="./assets/images/logo-light-theme.svg" alt="bookmark logo" />
        </div>
        <div class="sidebar-nav">
          <div class="navitem home">
            <img src="./assets/images/icon-home.svg" alt="" />
            <span>Home</span>
          </div>
          <div class="navitem archive">
            <img src="./assets/images/icon-archive.svg" alt="" />
            <span>Archived</span>
          </div>
        </div>
        <div class="sidebar-tags">
          <label class="tags-label" for="">TAGS</label>
          <div class="sidebar-container" id="sidebarContainer">
          </div>
        </div>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div class="search-bar">
            <img src="./assets/images/icon-search.svg" alt="" />
            <input type="text" placeholder="Search by title..."  id="searchInput"/>
          </div>
          <div class="user-profile">
            <div class="add-bookmark">
              <button class="add-bookmark-btn">+ Add Bookmark</button>
            </div>
            <div class="profile-cnt">
              <img src="./assets/images/image-avatar.webp" alt="" />
            </div>
          </div>
        </header>
        <section class="bookmark-section">
          <div class="filter-section">
            <h3>All Bookmarks</h3>
            <div class="filter-btn">
              <button class="sortBy-btn">
                <img src="./assets/images/icon-sort.svg" alt="" />sort by
              </button>
            </div>
          </div>
          <div class="bookmark-container" id="bookmarkContainer">
          </div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
